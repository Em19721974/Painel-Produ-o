<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Fábrica</title>
    <style>
        body { background-color: #2c3e50; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 280px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        #msg { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Acesso Fábrica</h2>
        <input type="text" id="u" placeholder="Usuário">
        <input type="password" id="s" placeholder="Senha">
        <button onclick="entrar()">Entrar</button>
        <p id="msg">Erro no login!</p>
    </div>
    <script>
        function entrar() {
            const u = document.getElementById('u').value;
            const s = document.getElementById('s').value;
            const users = {"Elias":"elias123", "Pedro":"pedro123", "Elivelton":"eli123", "Douglas":"doug123"};
            if(users[u] && users[u] === s) {
                alert('Entrando...');
                window.location.href = "https://www.google.com";
            } else {
                document.getElementById('msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
