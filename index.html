<<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Produção - Fábrica</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #219150; }
        #error { color: red; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card" id="login-screen">
        <h2>Acesso Fábrica</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
        <p id="error">Usuário ou senha incorretos!</p>
    </div>

    <script>
        const usuarios = {
            "Elias": "elias123",
            "Pedro": "pedro123",
            "Elivelton": "eli123",
            "Douglas": "doug123"
        };

        function logar() {
            const u = document.getElementById('user').value;
            const s = document.getElementById('pass').value;
            const erro = document.getElementById('error');

            if (usuarios[u] && usuarios[u] === s) {
                alert('Acesso concedido! Redirecionando para o painel...');
                // Aqui você pode colocar o link da sua planilha ou painel principal
                window.location.href = "https://www.google.com"; 
            } else {
                erro.style.display = 'block';
            }
        }
    </script>
</body>
</html>
